<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}

#lock-screen button:hover{opacity:.85}
#error-msg{color:#ff4444;margin-top:1rem;font-size:.85rem;display:none}
</style>
</head>

<div id="lock-screen">

</div>

async function unlock() {
  var pw = document.getElementById('pw').value;
  if (!pw) return;
  try {
    var key = await sha256Bytes(pw);
    var raw = base64ToBytes(_enc);
    var dec = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) {
      dec[i] = raw[i] ^ key[i % key.length];
    }
    var text = new TextDecoder().decode(dec);
    if (!text.trimStart().toLowerCase().startsWith('<!doctype') && !text.trimStart().toLowerCase().startsWith('<html')) {
      throw new Error('bad decrypt');
    }
    // Replace entire document with decrypted content
    document.open();
    document.write(text);
    document.close();
  } catch(e) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

function sha256Bytes(str) {
  var msg = new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256', msg).then(function(buf) {
    return new Uint8Array(buf);
  });
}

function base64ToBytes(b64) {
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) {
    bytes[i] = bin.charCodeAt(i);
  }
  return bytes;
}
